{% extends "base.html" %}
{% block title %}Admin - Kirish{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>🔐</h1>
            <h2>ADMIN PANEL</h2>
            <p>Boshqarish tizimi</p>
        </div>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label>Login</label>
                <input type="text" name="login" placeholder="Admin login" required autofocus>
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="parol" placeholder="Admin parol" required>
            </div>
            <button type="submit" class="btn btn-login" style="background:#e67e22">KIRISH</button>
        </form>
    </div>
</div>
{% endblock %}
