{% extends "base.html" %}
{% block title %}Kirish - Restoran POS{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <h1>🍽️</h1>
            <h2>RESTORAN POS</h2>
            <p>Ofitsiant tizimi</p>
        </div>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label>Login</label>
                <input type="text" name="login" placeholder="Login kiriting" required autofocus>
            </div>
            <div class="form-group">
                <label>Parol</label>
                <input type="password" name="parol" placeholder="Parol kiriting" required>
            </div>
            <button type="submit" class="btn btn-login">KIRISH</button>
        </form>
    </div>
</div>
{% endblock %}
